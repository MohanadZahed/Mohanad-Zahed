  <path d="M237 22 L257 22"/>
  <circle cx="262" cy="22" r="5"/>
  <path d="M267 22 L300 22 L320 42 L335 42"/>
  <circle cx="340" cy="42" r="5"/>

  <!-- Trace 3: small ring lower-left of the right cluster → up-right step → small node → down-right step → right ring -->
  <circle cx="225" cy="62" r="5"/>
  <path d="M230 62 L255 62 L275 42 L295 42"/>
  <circle cx="300" cy="42" r="5"/>
  <path d="M303.5 45.5 L320 62 L375 62"/>
