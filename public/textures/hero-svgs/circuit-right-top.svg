<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 445 322" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Trace 1: upper-left ring → right → 45° down to lower ring on the left -->
  <circle cx="124" cy="22" r="5"/>
  <path d="M129 22 L180 22"/>
  <circle cx="185" cy="22" r="5"/>
  <path d="M181.5 25.5 L155 52 L100 52"/>
  <circle cx="95" cy="52" r="5"/>

  <!-- Trace 2: top middle ring with small node, horizontal across, then down-right step to lower-right ring -->
