<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 327 257" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Trace 1: top vertical with circle, going down and right with 45° angles -->
  <circle cx="186" cy="12" r="5"/>
  <path d="M186 17 L186 55 L210 79 L280 79 L300 99 L327 99"/>

  <!-- Trace 2: starts upper-left with circle, small node, then steps down-right -->
  <circle cx="110" cy="45" r="5"/>
  <path d="M115 45 L138 45 L150 57"/>
  <circle cx="150" cy="57" r="3" fill="#ffffff"/>
  <path d="M150 57 L165 57 L180 72"/>
  <circle cx="180" cy="72" r="3" fill="#ffffff"/>
  <path d="M180 72 L215 72"/>
  <circle cx="215" cy="72" r="3" fill="#ffffff"/>

  <!-- Trace 3: left circle, small node, long horizontal, step down -->
  <circle cx="11" cy="106" r="5"/>
  <path d="M16 106 L60 106"/>
  <circle cx="60" cy="106" r="3" fill="#ffffff"/>
  <path d="M60 106 L130 106 L155 131 L225 131 L240 146 L290 146"/>
  <circle cx="290" cy="146" r="5"/>

  <!-- Trace 4: small middle horizontal with two nodes around a center circle, extending right -->
  <path d="M140 168 L165 168"/>
  <circle cx="165" cy="168" r="3" fill="#ffffff"/>
  <path d="M165 168 L195 168"/>
  <circle cx="195" cy="168" r="5"/>
  <path d="M200 168 L240 168"/>

  <!-- Trace 5: bottom trace - circle bottom-left, up-right zigzag to right edge circle -->
  <circle cx="103" cy="240" r="5"/>
  <path d="M108 240 L185 240 L210 215 L290 215"/>
  <circle cx="295" cy="215" r="5"/>
</svg>
